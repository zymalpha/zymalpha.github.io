[[items]]
title = "Ctrl-MAR：基于可控扩散模型的 CT 金属伪影去除"
subtitle = "IEEE Transactions on Medical Imaging 投稿"
date = "2026.01 - 2026.05"
content = "提出两阶段可控扩散框架，面向 CT 金属伪影去除中的结构不一致、纹理过平滑和伪影残留问题。负责整体方案设计、一阶段框架搭建、ControlNet 去伪影模块与残差细化模块设计，以及训练和泛化验证策略实现。"
tags = ["CT", "扩散模型", "ControlNet", "金属伪影去除"]

[[items]]
title = "DA-SAM：面向 CBCT 投影域金属轨迹分割的双适配器 SAM 框架"
subtitle = "MICCAI 投稿"
date = "2025.09 - 2026.02"
content = "针对 SAM 在 CBCT 投影域的域差异、高频边界捕捉不足和提示依赖问题，提出自提示与空频双域适配框架。独立提出整体架构，构建 CBCT 投影数据集，主导模型训练、参数调优与论文写作。"
