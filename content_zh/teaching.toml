[[items]]
title = "基于 Swin Mamba 与 WGAN-GP 的 CT 图像超分辨率重建"
subtitle = "IEEE Transactions on Medical Imaging 大修"
date = "2025.05 - 2025.11"
content = "提出两阶段 CT 体数据超分辨率重建框架，结合 Swin Mamba、小波域损失与 WGAN-GP 纹理保持模块，改善 3D CT 超分中的结构恢复与纹理过平滑问题。负责一阶段网络架构、小波域损失函数、部分对比实验与消融分析，并参与方法和实验章节写作。"
